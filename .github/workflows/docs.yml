name: Auto-generate Command Docs

permissions:
  contents: write

on:
  push:
    paths:
      - '**/*Commands.cs'

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Generate MD
        run: dotnet run .github/scripts/GenerateDocs.cs

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(client): Auto-generate command list [skip ci]"
          file_pattern: 'assets/docs/COMMANDS.md'
