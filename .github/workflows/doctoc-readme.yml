name: DocToc README.md

permissions:
  contents: write

on:
  push:
    paths:
      - "README.md"
  workflow_dispatch:

jobs:
  update-toc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: DocToc README.md
        run: npx doctoc@2.3.0 README.md --maxlevel 3

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(readme): DocToc README.md [skip ci]"
          file_pattern: 'README.md'
